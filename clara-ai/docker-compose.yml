version: "3"

services:
  n8n:
    image: n8nio/n8n
    ports:
      - "5678:5678"

    environment:
      - N8N_SECURE_COOKIE=false
      - NODE_FUNCTION_ALLOW_EXTERNAL=*
      - NODE_FUNCTION_ALLOW_BUILTIN=*
      - N8N_ALLOW_EXECUTE_COMMAND=true
      - EXECUTIONS_PROCESS=main

    volumes:
      - ./n8n_data:/home/node/.n8n
      - ./:/files